<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logen</title>

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(rgba(0,0,0,0.12), rgba(0,0,0,0.28)),
        url('assets/bg.png') center center / cover no-repeat fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
      opacity: 0.08;
      pointer-events: none;
    }

    .countdown-wrap {
      position: fixed;
      left: 50%;
      bottom: 5.5vh;
      transform: translateX(-50%);
      width: min(720px, 88vw);
      text-align: center;
      z-index: 5;
      color: #c8963a;
      text-shadow:
        0 1px 0 rgba(0,0,0,0.9),
        0 0 8px rgba(0,0,0,0.7),
        0 0 16px rgba(0,0,0,0.45);
    }

    .countdown-title {
      margin: 0 0 8px;
      font-size: clamp(18px, 2vw, 30px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .countdown-subtitle {
      margin: 0 0 18px;
      font-size: clamp(15px, 1.5vw, 24px);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-items: end;
      max-width: 620px;
      margin: 0 auto;
      border-top: 1px solid rgba(200, 150, 58, 0.35);
      padding-top: 14px;
    }

    .time-box {
      position: relative;
      padding: 0 10px;
    }

    .time-box:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 8%;
      right: 0;
      width: 1px;
      height: 84%;
      background: rgba(200, 150, 58, 0.35);
    }

    .time-value {
      display: block;
      font-size: clamp(34px, 4.8vw, 74px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .time-unit {
      display: block;
      margin-top: 8px;
      font-size: clamp(11px, 1.05vw, 18px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 700px) {
      body {
        background:
          linear-gradient(rgba(0,0,0,0.12), rgba(0,0,0,0.3)),
          url('assets/bg.png') center center / cover no-repeat;
      }

      .countdown-wrap {
        bottom: 3.8vh;
        width: 92vw;
      }

      .countdown-title {
        margin-bottom: 6px;
      }

      .countdown-subtitle {
        margin-bottom: 12px;
      }

      .countdown {
        gap: 4px;
        padding-top: 10px;
      }

      .time-box {
        padding: 0 4px;
      }

      .time-value {
        font-size: clamp(24px, 8vw, 46px);
      }

      .time-unit {
        font-size: clamp(9px, 2.5vw, 12px);
      }
    }
  </style>
</head>
<body>

  <div class="countdown-wrap">
    <div class="countdown-title">Ceremonien nærmer sig...</div>
    <div class="countdown-subtitle">Vigtig information vil blive frigivet ved sidste klokkeslag...</div>

    <div class="countdown">
      <div class="time-box">
        <span class="time-value" id="days">00</span>
        <span class="time-unit">Dage</span>
      </div>
      <div class="time-box">
        <span class="time-value" id="hours">00</span>
        <span class="time-unit">Timer</span>
      </div>
      <div class="time-box">
        <span class="time-value" id="minutes">00</span>
        <span class="time-unit">Minutter</span>
      </div>
      <div class="time-box">
        <span class="time-value" id="seconds">00</span>
        <span class="time-unit">Sekunder</span>
      </div>
    </div>
  </div>

  <script>
    const unlockDate = new Date('2026-05-09T21:59:00Z');

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function updateCountdown() {
      const now = new Date();
      const diff = unlockDate - now;

      if (diff <= 0) {
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
