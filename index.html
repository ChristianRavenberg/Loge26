<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logen</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      transform: translateY(-4%);
      z-index: 1;
      pointer-events: none;
      user-select: none;
    }

    .countdown-wrap {
      position: absolute;
      left: 50%;
      bottom: 6.2%;
      transform: translateX(-50%);
      width: min(78vw, 560px);
      text-align: center;
      z-index: 3;
      color: #c8943a;
      text-shadow:
        0 1px 0 rgba(0,0,0,0.95),
        0 0 8px rgba(0,0,0,0.85),
        0 0 16px rgba(0,0,0,0.55);
    }

    .countdown-title {
      margin: 0 0 2px;
      font-size: clamp(13px, 1.2vw, 22px);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .countdown-subtitle {
      margin: 0 0 10px;
      font-size: clamp(12px, 1.05vw, 18px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      max-width: 500px;
      margin: 0 auto;
      padding-top: 10px;
      border-top: 1px solid rgba(200, 148, 58, 0.28);
    }

    .time-box {
      position: relative;
      padding: 0 6px;
    }

    .time-box:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 8%;
      right: 0;
      width: 1px;
      height: 78%;
      background: rgba(200, 148, 58, 0.28);
    }

    .time-value {
      display: block;
      font-size: clamp(30px, 3.6vw, 58px);
      line-height: 1;
      font-weight: 500;
    }

    .time-unit {
      display: block;
      margin-top: 6px;
      font-size: clamp(10px, 0.95vw, 16px);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 700px) {
      .poster {
        transform: translateY(-8%);
      }

      .countdown-wrap {
        bottom: 10.8%;
        width: 88vw;
      }

      .countdown-title {
        font-size: 10px;
      }

      .countdown-subtitle {
        font-size: 9px;
        margin-bottom: 8px;
      }

      .time-value {
        font-size: 24px;
      }

      .time-unit {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img class="poster" src="assets/bg.png" alt="Logen" />

    <div class="countdown-wrap">
      <div class="countdown-title">Ceremonien nærmer sig...</div>
      <div class="countdown-subtitle">Vigtig information vil blive frigivet ved sidste klokkeslag...</div>

      <div class="countdown">
        <div class="time-box">
          <span class="time-value" id="days">00</span>
          <span class="time-unit">Dage</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="hours">00</span>
          <span class="time-unit">Timer</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="minutes">00</span>
          <span class="time-unit">Minutter</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="seconds">00</span>
          <span class="time-unit">Sekunder</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const unlockDate = new Date('2026-05-09T21:59:00Z');

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function updateCountdown() {
      const now = new Date();
      const diff = unlockDate - now;

      if (diff <= 0) {
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
